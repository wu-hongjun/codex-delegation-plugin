name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        node:
          - 20
          - 22
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check formatting
        run: npm run format

      - name: PTY smoke (node-pty)
        run: |
          node -e "
            const pty = require('node-pty');
            const p = pty.spawn('/bin/sh', ['-c', 'echo ok'], {
              name: 'xterm-color',
              cols: 80,
              rows: 24,
              cwd: process.cwd(),
              env: process.env,
            });
            let out = '';
            const timer = setTimeout(() => {
              console.error('PTY smoke timed out after 5s; stdout was', JSON.stringify(out));
              process.exit(1);
            }, 5000);
            p.onData((d) => { out += d; });
            p.onExit(() => {
              clearTimeout(timer);
              if (!out.includes('ok')) {
                console.error('PTY smoke failed: stdout was', JSON.stringify(out));
                process.exit(1);
              }
              console.log('PTY smoke ok');
              process.exit(0);
            });
          "

      - name: Test
        run: npm test

      - name: Test attach lane
        run: npm run test:attach
